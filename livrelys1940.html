<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Liseuse PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* MENU GAUCHE */
    nav {
      width: 220px;
      background: #1a1a1a;
      height: 100vh;
      padding: 15px;
      box-sizing: border-box;
      position: fixed;
      left: 0;
      top: 0;
    }

    nav h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    nav a {
      display: block;
      padding: 10px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-bottom: 10px;
      background: #333;
    }

    nav a:hover {
      background: #555;
    }

    /* CONTENU */
    main {
      margin-left: 220px;
      width: 100%;
    }

    header {
      padding: 10px;
      text-align: center;
      background: #222;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
    }

    canvas {
      margin-bottom: 15px;
      width: 100%;
      max-width: 800px;
      height: auto;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #444;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav {
        position: relative;
        width: 100%;
        height: auto;
      }

      main {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

<!-- MENU -->
<nav>
  <h2>📚 Menu</h2>
  <a href="#" onclick="scrollToTop()">📖 Le livre</a>
  <a href="#">⚖️ Mentions légales</a>
  <a href="#">🔗 Liens associés</a>
</nav>

<!-- CONTENU -->
<main>
  <header>
    <button onclick="prevPage()">⬅️</button>
    <button onclick="nextPage()">➡️</button>
  </header>

  <div id="viewer"></div>
</main>

<script>
  const url = "ton-fichier.pdf";
  const startPage = 3;

  let pdfDoc = null;
  let scale = 1.5;

  const viewer = document.getElementById("viewer");

  pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;
    renderAllPages();
  });

  function renderAllPages() {
    viewer.innerHTML = "";
    for (let i = startPage; i <= pdfDoc.numPages; i++) {
      renderPage(i);
    }
  }

  function renderPage(num) {
    pdfDoc.getPage(num).then(page => {
      const viewport = page.getViewport({ scale: scale });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.height = viewport.height;
      canvas.width = viewport.width;

      viewer.appendChild(canvas);

      page.render({
        canvasContext: context,
        viewport: viewport
      });
    });
  }

  function prevPage() {
    window.scrollBy({
      top: -window.innerHeight,
      behavior: "smooth"
    });
  }

  function nextPage() {
    window.scrollBy({
      top: window.innerHeight,
      behavior: "smooth"
    });
  }

  function scrollToTop() {
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }
</script>

</body>
</html>
