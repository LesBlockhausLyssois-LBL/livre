<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Liseuse PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #222;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #444;
      color: white;
      border-radius: 5px;
      font-size: 14px;
    }

    button:hover {
      background: #666;
    }

    #viewer {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      max-width: 100%;
      height: auto;
    }

    @media (max-width: 600px) {
      button {
        font-size: 12px;
        padding: 6px;
      }
    }
  </style>
</head>
<body>

<header>
  <button onclick="prevPage()">⬅️</button>
  <span id="pageInfo">Page 1</span>
  <button onclick="nextPage()">➡️</button>
</header>

<div id="viewer">
  <canvas id="pdfCanvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
  const url = "livrelys1940.pdf"; // 👉 mets ton PDF ici

  let pdfDoc = null,
      pageNum = 1,
      scale = 1.2,
      canvas = document.getElementById('pdfCanvas'),
      ctx = canvas.getContext('2d');

  pdfjsLib.getDocument(url).promise.then(function(pdf) {
    pdfDoc = pdf;
    renderPage(pageNum);
  });

  function renderPage(num) {
    pdfDoc.getPage(num).then(function(page) {
      const viewport = page.getViewport({ scale: scale });

      canvas.height = viewport.height;
      canvas.width = viewport.width;

      page.render({
        canvasContext: ctx,
        viewport: viewport
      });

      document.getElementById("pageInfo").textContent =
        "Page " + num + " / " + pdfDoc.numPages;
    });
  }

  function nextPage() {
    if (pageNum < pdfDoc.numPages) {
      pageNum++;
      renderPage(pageNum);
    }
  }

  function prevPage() {
    if (pageNum > 1) {
      pageNum--;
      renderPage(pageNum);
    }
  }

  // Zoom tactile mobile
  let currentScale = 1.2;

  window.addEventListener("wheel", (e) => {
    if (e.ctrlKey) {
      e.preventDefault();
      currentScale += e.deltaY * -0.01;
      currentScale = Math.min(Math.max(0.5, currentScale), 3);
      scale = currentScale;
      renderPage(pageNum);
    }
  }, { passive: false });

</script>

</body>
</html>
